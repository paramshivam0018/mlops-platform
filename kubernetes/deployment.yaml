apiVersion: apps/v1
kind: Deployment
metadata:
  name: iris-api
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: iris-api
  template:
    metadata:
      labels:
        app: iris-api
    spec:
      containers:
      - name: iris-api
        image: 341920718173.dkr.ecr.ap-south-1.amazonaws.com/mlops-iris-api:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
